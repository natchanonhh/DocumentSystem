<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocumentSystem - Smart Login</title>
  <style>
    body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; margin: 0; user-select: none; -webkit-user-select: none; }
    .container { width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; margin-top: 30px; }
    input { width: 90%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
    button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
    
    .job-btn { background: #007bff; text-align: left; padding: 15px; margin-bottom: 15px; font-size: 18px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
    .job-btn:hover { background: #0056b3; }
    
    .protected-view { position: relative; margin-top: 20px; width: 100%; height: 650px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
    .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 40px; color: rgba(0,0,0,0.15); pointer-events: none; width: 100%; z-index: 10; font-weight: bold; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(255,255,255,0.5); }
    
    iframe, img { width: 100%; height: 100%; border: none; }
    .block-interaction { pointer-events: none; }
    .pdf-viewer { pointer-events: auto !important; }
    
    /* 🛡️ เกราะล่องหน: บล็อกปุ่ม Pop-out มุมขวาบนของ Google Drive */
    .drive-blocker { position: absolute; top: 0; right: 0; width: 80px; height: 60px; background: transparent; z-index: 99; cursor: not-allowed; }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="container" id="loginBox">
    <h2>SCHOOL MONEY</h2>
    <p>ระบุตัวตนเพื่อเข้าดูข้อมูล (Smart Login)</p>
    <input type="text" id="studentId" placeholder="กรอกชื่อ หรือรหัสที่นี่..." required>
    <button onclick="checkData()">เข้าสู่ระบบ</button>
    <p id="errorMsg" style="color: red; display: none; margin-top: 15px;">❌ ไม่พบสิทธิ์การเข้าถึงงานใดๆ</p>
  </div>

  <div class="container" id="menuBox" style="display: none;">
    <h3 id="menuTitle"></h3>
    <p style="color:gray; margin-bottom: 20px;">กรุณาเลือกงานที่คุณต้องการเข้าชม</p>
    <div id="jobList"></div>
    <br>
    <button style="background: #dc3545;" onclick="location.reload()">ออกจากระบบ</button>
  </div>

  <div class="container" id="contentBox" style="display: none;">
    <h3 id="displayName"></h3>
    
    <div class="protected-view">
      <div class="watermark" id="watermarkText"></div>
      <div id="driveBlocker" class="drive-blocker" style="display: none;" title="ไม่อนุญาตให้เปิดภายนอก"></div>
      <div id="fileViewer" style="width: 100%; height: 100%;"></div>
    </div>
    
    <br>
    <button style="background: #ffc107; color: #000;" onclick="backToMenu()">🔙 กลับไปหน้าเลือกงาน</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBLyMpowfyQK_1UnredPFmXdBdtQZKpY-c",
      authDomain: "datapdf-d14d0.firebaseapp.com",
      databaseURL: "https://datapdf-d14d0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "datapdf-d14d0",
      storageBucket: "datapdf-d14d0.firebasestorage.app",
      messagingSenderId: "1034739093928",
      appId: "1:1034739093928:web:cd56cc0e208d7d00f24d9d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let currentLogId = null;
    let userFiles = []; 
    let currentId = "";

    window.checkData = async function() {
      const id = document.getElementById("studentId").value.trim();
      if (!id) return;
      document.getElementById("errorMsg").style.display = "none";
      
      try {
        // ค้นหางานทั้งหมดที่ใน Array "allowedUsers" มีรหัสของคนนี้อยู่
        const q = query(collection(db, "jobs"), where("allowedUsers", "array-contains", id));
        const querySnapshot = await getDocs(q);

        userFiles = [];
        querySnapshot.forEach((docSnap) => {
          userFiles.push(docSnap.data());
        });

        if (userFiles.length > 0) {
          currentId = id;
          
          // บันทึกประวัติ
          const logsCol = collection(db, "access_logs");
          const newLog = await addDoc(logsCol, { studentId: id, loginTime: serverTimestamp(), logoutTime: null });
          currentLogId = newLog.id;

          document.getElementById("loginBox").style.display = "none";
          document.getElementById("menuBox").style.display = "block";
          document.getElementById("menuTitle").innerText = `รหัสของคุณ: ${id}`;
          
          let html = "";
          userFiles.forEach((file, index) => {
            let icon = file.type === "youtube" ? "▶️" : (file.type === "image" ? "🖼️" : "📄");
            html += `<button class="job-btn" onclick="openFile(${index})">
                       <span>${icon} ${file.title}</span> 
                       <span>👉</span>
                     </button>`;
          });
          document.getElementById("jobList").innerHTML = html;

        } else {
          document.getElementById("errorMsg").style.display = "block";
        }
      } catch (error) {
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล");
      }
    }

    window.openFile = function(index) {
      const file = userFiles[index];
      
      document.getElementById("menuBox").style.display = "none";
      document.getElementById("contentBox").style.display = "block";
      document.getElementById("displayName").innerText = file.title;
      document.getElementById("watermarkText").innerText = `${currentId}\nไม่อนุญาตให้เผยแพร่`;

      const viewer = document.getElementById("fileViewer");
      const blocker = document.getElementById("driveBlocker");
      
      if (file.type === "youtube") {
        blocker.style.display = "none";
        viewer.innerHTML = `<iframe class="block-interaction" src="${file.url}?modestbranding=1&controls=0&rel=0&disablekb=1&fs=0" allow="autoplay" allowfullscreen></iframe>`;
      } else if (file.type === "image") {
        blocker.style.display = "none";
        viewer.innerHTML = `<img class="block-interaction" src="${file.url}" style="object-fit: contain;">`;
      } else if (file.type === "pdf") {
        blocker.style.display = "block"; // เปิดใช้งานเกราะป้องกันมุมขวาบน
        viewer.innerHTML = `<iframe class="pdf-viewer" src="${file.url}#toolbar=0&navpanes=0&scrollbar=0" allowfullscreen></iframe>`;
      }
    }

    window.backToMenu = function() {
      document.getElementById("fileViewer").innerHTML = ""; 
      document.getElementById("contentBox").style.display = "none";
      document.getElementById("menuBox").style.display = "block";
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'p'))) {
        e.preventDefault(); return false;
      }
    });

    window.addEventListener("beforeunload", (e) => {
      if (currentLogId) { updateDoc(doc(db, "access_logs", currentLogId), { logoutTime: serverTimestamp() }); }
    });
  </script>
</body>
</html>
