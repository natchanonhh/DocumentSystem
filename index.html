<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocumentSystem - DocumentSystem</title>
  <style>
    /* สไตล์แบบ Apple Design Language */
    :root {
      --apple-blue: #0071e3;
      --apple-blue-hover: #0077ed;
      --apple-green: #34c759;
      --apple-red: #ff3b30;
      --apple-bg: #f5f5f7;
      --apple-card-bg: #ffffff;
      --apple-text-main: #1d1d1f;
      --apple-text-muted: #86868b;
      --apple-border: #d2d2d7;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--apple-bg); 
      color: var(--apple-text-main);
      display: flex; 
      justify-content: center; 
      padding: 40px 20px; 
      margin: 0; 
      user-select: none; 
      -webkit-user-select: none; 
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container { 
      width: 100%; 
      max-width: 650px; 
      background: var(--apple-card-bg);
      padding: 45px 40px; 
      border-radius: 20px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
      text-align: center; 
      margin-top: 20px; 
      box-sizing: border-box;
      position: relative;
    }

    h2 { 
      font-size: 28px; 
      font-weight: 600; 
      letter-spacing: -0.02em; 
      margin-top: 0;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 0;
    }

    p { 
      color: var(--apple-text-muted); 
      font-size: 15px; 
      margin-bottom: 24px;
    }
    
    input { 
      width: 100%; 
      padding: 16px;
      margin-bottom: 20px; 
      background-color: #f5f5f7;
      border: 1px solid transparent; 
      border-radius: 14px; 
      font-size: 17px; 
      font-family: inherit;
      text-align: center; 
      color: var(--apple-text-main);
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    input:focus { 
      background-color: #fff;
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15); 
      outline: none; 
    }
    input::placeholder { color: #a1a1a6;
    }
    
    button { 
      width: 100%; 
      padding: 16px;
      background: var(--apple-blue); 
      color: white; 
      border: none; 
      border-radius: 14px; 
      font-size: 17px; 
      font-family: inherit;
      cursor: pointer; 
      font-weight: 600; 
      margin-bottom: 12px;
      transition: transform 0.1s, background 0.2s, opacity 0.2s;
    }
    button:active { transform: scale(0.97);
    }
    button:hover { background: var(--apple-blue-hover); }
    
    /* ระบบป้ายโฆษณา (Banner Slider) */
    .banner-wrapper {
      width: 100%;
      aspect-ratio: 2 / 1;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      display: flex;
      scroll-behavior: smooth;
      border-radius: 14px;
      margin-bottom: 20px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .banner-wrapper::-webkit-scrollbar {
      display: none;
    }
    .banner-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      position: relative;
    }
    .banner-slide a {
      display: block;
      width: 100%;
      height: 100%;
    }
    .banner-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
      pointer-events: auto;
    }

    .item-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 25px 15px;
      margin-top: 10px;
      margin-bottom: 25px;
      align-items: start;
    }
    .grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
      padding: 10px;
      border-radius: 12px;
      justify-content: flex-start;
      height: auto; 
      min-height: 140px;
      width: 100%;
      box-sizing: border-box;
    }
    .grid-item:hover {
      background-color: rgba(0,0,0,0.03);
      transform: scale(0.97);
    }
    
    .grid-icon {
      margin-bottom: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 65px; 
      width: 100%;
      position: relative;
    }
    
    .grid-icon svg.icon-folder { width: 70px; height: auto;
    }
    .grid-icon svg.icon-file { width: 48px; height: auto; }
    .grid-icon svg.icon-wide { width: 62px;
      height: auto; }

    /* ปรับแต่งส่วนแสดงชื่อสำหรับมุมมอง Grid ไม่ให้ตัดคำ แต่ให้ขึ้นบรรทัดใหม่ */
    .grid-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--apple-text-main);
      text-align: center;
      line-height: 1.4;
      width: 100%;
      word-break: break-word; 
      overflow-wrap: break-word; 
      white-space: normal;
    }

    .grid-lock {
      font-size: 12px;
      margin-top: 6px;
      color: var(--apple-text-main);
      text-align: center;
    }

    .grid-time {
      font-size: 11px;
      color: var(--apple-text-muted);
      margin-top: 6px;
      text-align: center;
      line-height: 1.3;
    }

    /* --- Apple View Menu Styles --- */
    .options-btn-wrap-relative {
      position: relative;
      flex-shrink: 0;
    }
    
    .options-btn {
      background: transparent;
      border: none;
      color: var(--apple-blue);
      cursor: pointer;
      padding: 8px;
      width: auto;
      margin-bottom: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .options-btn:hover { background: rgba(0, 113, 227, 0.1); transform: none;
    }
    .options-btn:active { transform: scale(0.92); }
    
    .apple-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      border-radius: 14px;
      width: 230px;
      z-index: 100;
      text-align: left;
      padding: 8px;
      font-size: 15px;
      color: var(--apple-text-main);
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }
    .dropdown-item:hover { background: var(--apple-blue); color: white;
    }
    .dropdown-item:hover .check-icon, .dropdown-item:hover small, .dropdown-item:hover .dropdown-icon { color: white !important;
    }
    .dropdown-divider { height: 1px; background: rgba(0,0,0,0.1); margin: 6px 0;
    }
    .check-icon { width: 24px; font-weight: bold; font-size: 14px; display: inline-block;
    }
    .dropdown-icon { margin-right: 12px; display:flex; align-items:center; }
    .dropdown-text { flex-grow: 1; display: flex;
      flex-direction: column; font-weight: 500; }

    /* --- List View Styles --- */
    .item-grid.list-view { 
      display: flex;
      flex-direction: column; 
      gap: 0; 
      background: #fbfbfd; 
      border-radius: 16px; 
      padding: 5px 0; 
      border: 1px solid var(--apple-border);
      width: 100%;
      box-sizing: border-box;
    }
    .item-grid.list-view .grid-item { 
      flex-direction: row; 
      align-items: center; 
      justify-content: flex-start;
      height: auto; 
      min-height: 60px; 
      padding: 12px 15px; 
      border-radius: 0; 
      border-bottom: 1px solid rgba(0,0,0,0.05); 
      width: 100%;
      box-sizing: border-box;
    }
    .item-grid.list-view .grid-item:last-child { border-bottom: none; }
    .item-grid.list-view .grid-item:hover { background-color: rgba(0,0,0,0.04); transform: none;
    }
    .item-grid.list-view .grid-icon { 
      width: 40px; 
      height: 40px; 
      margin-bottom: 0;
      margin-right: 15px; 
      flex-shrink: 0; 
      display:flex; 
      justify-content:center; 
      align-items:center; 
    }
    .item-grid.list-view .grid-icon svg { width: 100% !important;
      height: auto !important; max-height: 100%; }
    
    /* ปรับแต่งส่วนแสดงชื่อสำหรับมุมมอง List ให้แสดงเต็มและขึ้นบรรทัดใหม่ */
    .item-grid.list-view .grid-name { 
      text-align: left;
      font-size: 15px; 
      white-space: normal; 
      flex: 1 1 auto; 
      min-width: 0; 
      margin-right: 10px; 
      display: block; 
      word-break: break-word; 
      overflow-wrap: break-word;
    }
    
    .item-grid.list-view .grid-time { 
      text-align: right;
      margin-top: 0; 
      flex-shrink: 0; 
      font-size: 12px; 
      white-space: nowrap; 
    }
    .item-grid.list-view .grid-lock { 
      margin-top: 0;
      margin-left: 8px; 
      flex-shrink: 0; 
    }
    
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    
    .back-btn {
      background: transparent;
      color: var(--apple-blue);
      padding: 8px 0;
      width: auto;
      margin: 0;
      margin-bottom: 10px;
      font-size: 15px;
    }
    .back-btn:hover { background: rgba(0, 113, 227, 0.1); padding: 8px 10px; border-radius: 8px;
      margin-right: -10px;}

    .protected-view { 
      position: relative;
      margin-top: 25px; 
      width: 100%;
      height: 650px;
      background: #fbfbfd; 
      border-radius: 16px; 
      border: 1px solid var(--apple-border);
      overflow: hidden;
    }
    .watermark { 
      position: absolute; 
      top: 50%; 
      left: 50%;
      transform: translate(-50%, -50%) rotate(-30deg); 
      font-size: 40px; 
      color: rgba(0,0,0,0.08); 
      pointer-events: none; 
      width: 100%; 
      z-index: 10; 
      font-weight: 700; 
      text-transform: uppercase;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8); 
    }
    
    iframe, img { width: 100%; height: 100%;
      border: none; }
    .block-interaction { pointer-events: none; }
    .pdf-viewer { pointer-events: auto !important;
    }
    
    .drive-blocker { position: absolute; top: 0; left: 0; width: 100%; height: 60px;
      background: transparent; z-index: 99; cursor: not-allowed; }

    #downloadSection {
      margin-bottom: 25px;
      padding: 24px; 
      background: #f5f5f7; 
      border-radius: 16px; 
      border: none;
    }
    
    .link-btn {
      display: inline-block;
      background: var(--apple-blue);
      color: white;
      padding: 16px 32px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 17px;
      transition: 0.2s;
    }
    .link-btn:hover { background: var(--apple-blue-hover); }

    @media (max-width: 580px) { 
      .item-grid { grid-template-columns: repeat(3, 1fr);
      gap: 20px 10px; } 
      .container { padding: 35px 20px;
      }
    }
    @media (max-width: 400px) { 
      .item-grid { grid-template-columns: repeat(2, 1fr);
      gap: 15px 10px; } 
    }
  </style>
</head>

            <path d="M0 24C0 20.6863 2.68629 18 6 18H94C97.3137 18 100 20.6863 100 24V68C100 74.6274 94.6274 80 88 80H12C5.37258 80 0 74.6274 0 68V24Z" fill="${c[1]}"/>`;

    function formatTime(timestamp) {
        if (!timestamp) return "";
        try {
            const date = timestamp.toDate ?
              timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('th-TH', { 
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            }) + " น.";
        } catch(e) { return ""; }
    }

    function getSortDate(obj, isFolder) {
        let ts = isFolder ?
          obj.meta.updatedAt : (obj.updatedAt || obj.createdAt);
        if (!ts) return 0;

        try {
            const snap = await getDocs(collection(db, "banners"));
            let banners = [];
            snap.forEach(doc => banners.push({id: doc.id, ...doc.data()}));
            
            if (banners.length === 0) return;
            
            let html = '';
            banners.forEach(b => {
                if(b.link) {
                    html += `<div class="banner-slide"><a href="${b.link}" target="_blank"><img src="${b.imageUrl}"></a></div>`;
                } else {
                    html += `<div class="banner-slide"><img src="${b.imageUrl}"></div>`;
             
                }
            });

            const loginBanner = document.getElementById('loginBanner');
            const menuBanner = document.getElementById('menuBanner');
            
            if(loginBanner) { loginBanner.innerHTML = html; loginBanner.style.display = "flex";
            }
            if(menuBanner) { menuBanner.innerHTML = html; menuBanner.style.display = "flex";
            }

            if(window.bannerInterval) clearInterval(window.bannerInterval);
            window.bannerInterval = setInterval(() => {
                [loginBanner, menuBanner].forEach(container => {
                    if(container && container.style.display !== "none") {
                        const scrollWidth = container.clientWidth;
                        if 
                          (container.scrollLeft + scrollWidth >= container.scrollWidth - 10) {
                            container.scrollTo({ left: 0, behavior: 'smooth' });
                        } else {
                            container.scrollBy({ left: scrollWidth, behavior: 'smooth' });

        }

    window.checkData = async function() {
      const rawId = document.getElementById("studentId").value.trim();
      if (!rawId) return;
      document.getElementById("errorMsg").style.display = "none";
      try {
        const searchId = rawId.replace(/[\s"']/g, '').toLowerCase();
        const q1 = query(collection(db, "jobs"), where("allowedUsers", "array-contains", rawId));
        const q2 = query(collection(db, "jobs"), where("searchableUsers", "array-contains", searchId));
        const q3 = query(collection(db, "jobs"), where("type", "==", "system_folder"));

        const [snap1, snap2, snap3] = await Promise.all([getDocs(q1), getDocs(q2), getDocs(q3)]);

        const fileMap = new Map();
        snap1.forEach(docSnap => { fileMap.set(docSnap.id, { id: 
          docSnap.id, ...docSnap.data() }); });
        snap2.forEach(docSnap => { fileMap.set(docSnap.id, { id: docSnap.id, ...docSnap.data() }); });

        let allFiles = Array.from(fileMap.values());
        
        if (allFiles.length > 0) {
          let matchedId = rawId;
          folderMeta = {};
          userFiles = [];

          for (const 
            file of allFiles) {
             if (file.allowedUsers) {
                const exactMatch = file.allowedUsers.find(id => id.replace(/[\s"']/g, '').toLowerCase() === searchId);
                if (exactMatch) { matchedId = exactMatch; break; }
             }
          }
          currentId = matchedId;
          snap3.forEach(docSnap => {
              const data = docSnap.data();
              let path = (data.folder || "").trim().replace(/^\/+|\/+$/g, '');
              folderMeta[path] = { 
                  color: data.color || 'blue', 
                  emoji: data.emoji || '', 
                  password: data.password || '',
                  updatedAt: data.updatedAt || data.createdAt || null
              };
          });
          allFiles.forEach(file => {
              if (file.type !== "system_folder") {
                  let path = (file.folder || "").trim().replace(/^\/+|\/+$/g, '');
                  file.normalizedPath = path;
                  userFiles.push(file);
              }
    
          });

          const logsCol = collection(db, "access_logs");
          const newLog = await addDoc(logsCol, { studentId: currentId, loginTime: serverTimestamp(), logoutTime: null });
          currentLogId = newLog.id;

          document.getElementById("loginBox").style.display = "none";
          document.getElementById("menuBox").style.display = "block";
          document.getElementById("menuTitle").innerText = `รหัสผู้ใช้งาน: ${currentId}`;
          
          currentPath = "";
          renderExplorer();
        } else {
          document.getElementById("errorMsg").style.display = "block";
        }
      } catch (error) {
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล");
      }
    }

    window.renderExplorer = function() {
      let foldersInCurrentPath = new Set();
      let filesInCurrentPath = [];

      userFiles.forEach(file => {
          let fp = file.normalizedPath;
          if (fp === currentPath) {
              filesInCurrentPath.push(file);
          } 
          else if (fp.startsWith(currentPath ? currentPath + "/" : "")) {
              let remainingPath = fp.substring(currentPath ? currentPath.length + 1 : 
                0);
              let immediateSubfolder = remainingPath.split('/')[0];
              if (immediateSubfolder) foldersInCurrentPath.add(immediateSubfolder);
          }
      });
      let folderList = Array.from(foldersInCurrentPath).map(folderName => {
          let targetPath = currentPath ? `${currentPath}/${folderName}` : folderName;
          let meta = folderMeta[targetPath] || { color: 'blue', emoji: '', password: '', updatedAt: null };
          return { name: folderName, targetPath, meta, isFolder: true };
      });
      const sortData = (a, b, isFolder) => {
          let valA, valB;
          if (appSortMode === 'name') {
              valA = (isFolder ? a.name : a.title).toLowerCase();
              valB = (isFolder ? b.name : b.title).toLowerCase();
          } else if (appSortMode === 'type') {
              valA = isFolder ?
                'folder' : (a.type || '');
              valB = isFolder ? 'folder' : (b.type || '');
          } else if (appSortMode === 'date') {
              valA = getSortDate(a, isFolder);
              valB = getSortDate(b, isFolder);
          } else if (appSortMode === 'size') {
              valA = isFolder ?
                0 : (a.url ? a.url.length : 0);
              valB = isFolder ? 0 : (b.url ? b.url.length : 0);
          }
          
          if (valA < valB) return sortDesc ?
            1 : -1;
          if (valA > valB) return sortDesc ? -1 : 1;
          return 0;
      };
      folderList.sort((a, b) => sortData(a, b, true));
      filesInCurrentPath.sort((a, b) => sortData(a, b, false));

      let html = "";
      folderList.forEach(folder => {
          const folderName = folder.name;
          const safeFolderName = encodeURIComponent(folderName);
          let meta = folder.meta;
          let lockHtml = meta.password ? `<div class="grid-lock">🔒</div>` : "";
          let timeStr = formatTime(meta.updatedAt);
          
          html += `
      
            <div class="grid-item" onclick="openFolder('${safeFolderName}')">
              <div class="grid-icon">${getFolderIcon(meta.color, meta.emoji)}</div>
              <div class="grid-name">${folderName}</div>
              <div class="grid-time">${timeStr}</div>
              ${lockHtml}
            </div>
          `;
      });
      filesInCurrentPath.forEach((file) => {
          const index = userFiles.findIndex(f => f.id === file.id);
          let iconSvg = icons.pdf; 
          if (file.type === "youtube") iconSvg = icons.youtube;
          else if (file.type === "image") iconSvg = icons.image;
          else if (file.type === "link") iconSvg = icons.link;
          
       
          let lockHtml = file.password ? `<div class="grid-lock">🔒</div>` : "";
          let fileTimeStr = file.updatedAt ? formatTime(file.updatedAt) : (file.createdAt ? formatTime(file.createdAt) : "");

          html += `
            <div class="grid-item" onclick="openFile(${index})">
              <div class="grid-icon">${iconSvg}</div>
              <div class="grid-name">${file.title}</div>
            
              <div class="grid-time">${fileTimeStr}</div>
              ${lockHtml}
            </div>
          `;
      });
      if(html === "") html = "<p style='grid-column: 1/-1; text-align:center; color:#86868b; margin-top:20px;'>ไม่มีเอกสารในโฟลเดอร์นี้</p>";
      document.getElementById("itemList").innerHTML = html;
      
      const navHeader = document.getElementById("navHeader");
      const pathTitleEl = document.getElementById("currentPathTitle");
      
      if (currentPath === "") {
         navHeader.style.display = "none";
         pathTitleEl.innerText = "หน้าหลัก";
      } else {
         navHeader.style.display = "flex";
         let parts = currentPath.split('/');
         pathTitleEl.innerText = parts[parts.length - 1];
      }
    }

    window.openFolder = function(encodedFolderName) {
      const folderName = decodeURIComponent(encodedFolderName);
      let targetPath = currentPath === "" ? folderName : currentPath + "/" + folderName;
      let meta = folderMeta[targetPath];
      if (meta && meta.password) {
          let pwd = prompt("โฟลเดอร์นี้ถูกล็อก กรุณาใส่รหัสผ่าน:");
          if (pwd !== meta.password) {
              alert("รหัสผ่านไม่ถูกต้อง");
              return;
          }
      }
      currentPath = targetPath;
      renderExplorer();
    }

    window.navigateUp = function() {
       if (currentPath === "") return;
       let parts = currentPath.split('/');
       parts.pop(); 
       currentPath = parts.join('/');
       renderExplorer();
    }

    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'p'))) {
        e.preventDefault(); return false;
      }
    });
    window.addEventListener("beforeunload", (e) => {
      if (currentLogId) updateDoc(doc(db, "access_logs", currentLogId), { logoutTime: serverTimestamp() });
    });
  </script>
</body>
</html>
